<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns="http://www.w3.org/2000/svg" font-family="ConsolasFallback,Consolas,monospace" width="985px" height="610px" font-size="15px" role="img" aria-labelledby="title desc">
<title id="title">David Pine GitHub profile README card (dark mode)</title>
<desc id="desc">A terminal-inspired profile card for David Pine.</desc>
<style>
@font-face { src: local('Consolas'), local('Consolas Bold'); font-family: 'ConsolasFallback'; font-display: swap; -webkit-size-adjust: 109%; size-adjust: 109%; }
.text { fill: #F8FAFC; }
.key { fill: #FF7AD9; font-weight: 700; }
